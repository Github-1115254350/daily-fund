name: Fund List

on:
  workflow_dispatch:
    inputs:
      fund_type:
        description: '基金类型 (0=全部, 1=股票, 2=混合, 3=ETF, 4=债券)'
        required: false
        default: '0'
      page_size:
        description: '显示条数'
        required: false
        default: '20'

jobs:
  fetch-fund-list:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Fund List and Generate Image
        run: |
          pip install matplotlib --quiet
          python3 - <<'EOF'
          import urllib.request
          import urllib.parse
          import json
          import time
          import matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt
          import matplotlib.font_manager as fm

          fund_type = "${{ github.event.inputs.fund_type }}"
          page_size = "${{ github.event.inputs.page_size }}"

          params = {
              "FundType": fund_type,
              "SortColumn": "RZDF",
              "pageIndex": "1",
              "pageSize": page_size,
              "plat": "Iphone",
              "deviceid": str(time.time_ns()),
              "product": "EFund",
              "version": "6.4.5",
          }

          url = "https://fundmobapi.eastmoney.com/FundMNewApi/FundMNNetNewList?" + urllib.parse.urlencode(params)
          req = urllib.request.Request(url, headers={"User-Agent": "EFund/6.4.5 (iPhone; iOS 16.0)"})

          with urllib.request.urlopen(req, timeout=15) as resp:
              data = json.loads(resp.read())

          if not data.get("Success"):
              print("请求失败:", data)
              exit(1)

          total = data.get("TotalCount", 0)
          items = data.get("Datas", [])
          if items and isinstance(items[0], list):
              items = items[0]

          print(f"共 {total} 只基金，显示前 {len(items)} 条：")

          rows = []
          for item in items:
              name = item.get("SHORTNAME", "-")
              code = item.get("FCODE", "-")
              change = item.get("RZDF", "0")
              try:
                  change_f = float(change)
                  sign = "+" if change_f >= 0 else ""
                  change_str = f"{sign}{change_f:.2f}%"
              except (ValueError, TypeError):
                  change_f = 0
                  change_str = str(change)
              rows.append((name, code, change_str, change_f))

          # install Chinese font
          import subprocess
          subprocess.run(["apt-get", "install", "-y", "-q", "fonts-noto-cjk"], capture_output=True)
          fm._load_fontmanager(try_read_cache=False)
          cjk_fonts = [f for f in fm.findSystemFonts() if 'Noto' in f and 'CJK' in f]
          font_prop = fm.FontProperties(fname=cjk_fonts[0]) if cjk_fonts else None

          col_labels = ["基金名称", "基金代码", "涨跌幅"]
          table_data = [[r[0], r[1], r[2]] for r in rows]
          cell_colors = []
          for r in rows:
              if r[3] > 0:
                  color = (1.0, 0.88, 0.88)  # light red
              elif r[3] < 0:
                  color = (0.88, 1.0, 0.88)  # light green
              else:
                  color = (1.0, 1.0, 1.0)
              cell_colors.append(["#f5f5f5", "#f5f5f5", color])

          fig_height = max(4, len(rows) * 0.45 + 1.2)
          fig, ax = plt.subplots(figsize=(9, fig_height))
          ax.axis('off')

          fp = font_prop
          title_text = f"基金涨跌幅排行（共 {total} 只，显示前 {len(rows)} 条）"
          ax.set_title(title_text, fontproperties=fp, fontsize=13, pad=12)

          tbl = ax.table(
              cellText=table_data,
              colLabels=col_labels,
              cellColours=cell_colors,
              loc='center',
              cellLoc='center',
          )
          tbl.auto_set_font_size(False)
          tbl.set_fontsize(10)
          tbl.auto_set_column_width([0, 1, 2])

          for (row, col), cell in tbl.get_celld().items():
              if fp:
                  cell.get_text().set_fontproperties(fp)
              if row == 0:
                  cell.set_facecolor('#4472C4')
                  cell.get_text().set_color('white')
                  cell.set_text_props(fontweight='bold')

          plt.tight_layout()
          plt.savefig('fund_list.png', dpi=150, bbox_inches='tight')
          print("图片已保存: fund_list.png")
          EOF

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: fund-list-chart
          path: fund_list.png
          retention-days: 7
