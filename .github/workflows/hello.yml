name: Fund List

on:
  workflow_dispatch:
    inputs:
      fund_type:
        description: '基金类型 (0=全部, 1=股票, 2=混合, 3=ETF, 4=债券)'
        required: false
        default: '0'
      page_size:
        description: '显示条数'
        required: false
        default: '20'

jobs:
  fetch-fund-list:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Fund List
        run: |
          python3 - <<'EOF'
          import urllib.request
          import urllib.parse
          import json
          import time

          fund_type = "${{ github.event.inputs.fund_type }}"
          page_size = "${{ github.event.inputs.page_size }}"

          params = {
              "FundType": fund_type,
              "SortColumn": "RZDF",
              "pageIndex": "1",
              "pageSize": page_size,
              "plat": "Iphone",
              "deviceid": str(time.time_ns()),
              "product": "EFund",
              "version": "6.4.5",
          }

          url = "https://fundmobapi.eastmoney.com/FundMNewApi/FundMNNetNewList?" + urllib.parse.urlencode(params)
          req = urllib.request.Request(url, headers={"User-Agent": "EFund/6.4.5 (iPhone; iOS 16.0)"})

          with urllib.request.urlopen(req, timeout=15) as resp:
              data = json.loads(resp.read())

          if not data.get("Success"):
              print("请求失败:", data)
              exit(1)

          total = data.get("TotalCount", 0)
          items = data.get("Datas", [])
          if items and isinstance(items[0], list):
              items = items[0]

          print(f"共 {total} 只基金，显示前 {len(items)} 条：")
          print()
          print(f"{'基金名称':<20} {'基金代码':<10} {'涨跌幅':>8}")
          print("-" * 42)
          for item in items:
              name = item.get("SHORTNAME", "-")
              code = item.get("FCODE", "-")
              change = item.get("RZDF", "0")
              try:
                  change_f = float(change)
                  sign = "+" if change_f >= 0 else ""
                  change_str = f"{sign}{change_f:.2f}%"
              except (ValueError, TypeError):
                  change_str = str(change)
              print(f"{name:<20} {code:<10} {change_str:>8}")
          EOF
